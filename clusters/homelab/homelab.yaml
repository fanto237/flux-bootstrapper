apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: homelab-services
  namespace: flux-system
spec:
  interval: 1m0s
  url: https://github.com/fanto237/k8s-homelab
  secretRef:
    name: github-spoke-token
  ref:
    branch: main
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: homelab-services-deploy
  namespace: flux-system
spec:
  interval: 10m0s
  retryInterval: 1m
  timeout: 5m
  wait: true
  path: ./
  prune: true
  sourceRef:
    kind: GitRepository
    name: homelab-services
  decryption:
    provider: sops
    secretRef:
      name: sops-age
